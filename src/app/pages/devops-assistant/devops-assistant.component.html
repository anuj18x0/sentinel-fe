<div class="page animate-in">
    <div class="page-header">
        <h1>DevOps Assistant</h1>
        <p class="subtitle">AI-powered system diagnostics and insights</p>
    </div>

    <div class="chat-container card">
        <!-- Messages -->
        <div class="chat-messages">
            <div *ngFor="let msg of messages" class="message" [class.user]="msg.role === 'user'"
                [class.assistant]="msg.role === 'assistant'">
                <div class="message-avatar" *ngIf="msg.role === 'assistant'">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon
                            points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
                    </svg>
                </div>
                <div class="message-bubble">
                    <div class="message-content" [innerHTML]="formatContent(msg.content)"></div>
                    <span class="message-time">{{ msg.timestamp | date:'HH:mm' }}</span>
                </div>
                <div class="message-avatar user-avatar" *ngIf="msg.role === 'user'">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg>
                </div>
            </div>

            <!-- Loading indicator -->
            <div class="message assistant" *ngIf="isLoading">
                <div class="message-avatar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon
                            points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
                    </svg>
                </div>
                <div class="message-bubble typing">
                    <div class="typing-dots">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Input -->
        <div class="chat-input-area">
            <div class="input-wrapper">
                <input class="chat-input" [(ngModel)]="inputText" (keydown)="onKeyDown($event)"
                    placeholder="Ask about your system health..." [disabled]="isLoading" />
                <button class="send-btn" (click)="sendMessage()" [disabled]="isLoading || !inputText.trim()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13" />
                        <polygon points="22 2 15 22 11 13 2 9 22 2" />
                    </svg>
                </button>
            </div>
            <p class="input-hint">Press Enter to send · Try asking "Show system status" or "What anomalies were
                detected?"</p>
        </div>
    </div>
</div>
